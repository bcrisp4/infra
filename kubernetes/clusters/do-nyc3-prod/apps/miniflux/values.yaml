# Miniflux for do-nyc3-prod

image:
  tag: "2.2.17"

config:
  baseUrl: https://miniflux.marlin-tet.ts.net
  pollingFrequency: 60
  pollingScheduler: entry_frequency
  workerPoolSize: 16
  logLevel: info

ingress:
  enabled: true
  className: tailscale
  host: miniflux
  annotations:
    tailscale.com/proxy-group: ingress-proxies
    tailscale.com/tags: tag:k8s-services

database:
  instances: 1
  storage:
    size: 5Gi

# Database backup to DigitalOcean Spaces via Barman Cloud Plugin
backup:
  enabled: true
  immediate: true
  retentionPolicy: "28d"
  s3:
    itemName: do-nyc3-prod-miniflux-postgres-s3
    bucket: bc4-do-nyc3-prod-miniflux-postgres-backups
    endpoint: nyc3.digitaloceanspaces.com
    path: miniflux-db

# Prefer scheduling on same node as the database, spread replicas across nodes
affinity:
  podAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: cnpg.io/cluster
                operator: In
                values:
                  - miniflux-db
          topologyKey: kubernetes.io/hostname
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: miniflux
          topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: miniflux

# ExternalSecret for admin credentials from 1Password
externalSecret:
  enabled: true
  itemName: miniflux-admin
