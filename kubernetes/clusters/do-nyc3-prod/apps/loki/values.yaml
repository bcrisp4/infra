# Loki for do-nyc3-prod - SimpleScalable mode
# Uses DO Spaces for S3-compatible storage

externalSecret:
  enabled: true
  itemName: do-nyc3-prod-loki-s3

loki:
  deploymentMode: SimpleScalable

  loki:
    commonConfig:
      replication_factor: 1
    pattern_ingester:
      enabled: true
    compactor:
      retention_enabled: true
      delete_request_store: s3
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      retention_period: 14d
      otlp_config:
        resource_attributes:
          attributes_config:
            - action: index_label
              attributes:
                - cluster
                - log_source
                - service_name
    storage:
      bucketNames:
        chunks: ${S3_BUCKET}
        ruler: ${S3_BUCKET}
        admin: ${S3_BUCKET}
      s3:
        endpoint: ${S3_ENDPOINT}
        accessKeyId: ${AWS_ACCESS_KEY_ID}
        secretAccessKey: ${AWS_SECRET_ACCESS_KEY}
    runtimeConfig:
      overrides:
        prod:
          retention_period: 14d

  # SimpleScalable targets
  write:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi

  read:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

  backend:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi

  gateway:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        memory: 128Mi

  lokiCanary:
    enabled: false

  test:
    enabled: false

  # Disable caches (accept S3 reads for cache misses)
  resultsCache:
    enabled: false
  chunksCache:
    enabled: false

  # Disable distributed components (not used in SimpleScalable)
  ingester:
    replicas: 0
  querier:
    replicas: 0
  queryFrontend:
    replicas: 0
  queryScheduler:
    replicas: 0
  distributor:
    replicas: 0
  compactor:
    replicas: 0
  indexGateway:
    replicas: 0
  patternIngester:
    replicas: 0
  bloomPlanner:
    replicas: 0
  bloomBuilder:
    replicas: 0
  bloomGateway:
    replicas: 0
  singleBinary:
    replicas: 0
