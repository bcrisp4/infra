# Grafana for do-nyc3-prod
# Uses PostgreSQL via CloudNativePG instead of SQLite

# Custom Tailscale ingress with ProxyGroup
ingress:
  enabled: true
  className: tailscale
  host: grafana
  annotations:
    tailscale.com/proxy-group: ingress-proxies
    tailscale.com/tags: tag:k8s-services

# Database configuration (single instance)
database:
  instances: 1

# Database backup to DigitalOcean Spaces via Barman Cloud Plugin
backup:
  enabled: true
  immediate: true
  s3:
    itemName: do-nyc3-prod-grafana-postgres-s3
    bucket: bc4-do-nyc3-prod-grafana-postgres-backups
    endpoint: nyc3.digitaloceanspaces.com
    path: grafana-db

# ExternalSecret for admin credentials from 1Password
externalSecret:
  enabled: true
  itemName: do-nyc3-prod-grafana-admin

grafana:
  # Dashboard sidecar - watches for ConfigMaps with grafana_dashboard label
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      folderAnnotation: k8s-sidecar-target-directory
      provider:
        foldersFromFilesStructure: true

  grafana.ini:
    server:
      domain: grafana.marlin-tet.ts.net
      root_url: "%(protocol)s://%(domain)s"
    feature_toggles:
      provisioning: true
      kubernetesDashboards: true
    unified_alerting:
      enabled: true
    # Image rendering configuration
    rendering:
      server_url: http://grafana-image-renderer.grafana.svc.cluster.local:8081/render
      callback_url: http://grafana.grafana.svc.cluster.local/

  # Disable chart's ingress - using custom template with ProxyGroup format
  ingress:
    enabled: false

  # Disable chown init container (not needed with runAsNonRoot)
  initChownData:
    enabled: false

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # Provisioned datasources
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: prometheus-do-nyc3-prod
          type: prometheus
          access: proxy
          url: http://prometheus-kube-prometheus-stack-prometheus.prometheus.svc.cluster.local:9090
          editable: false
          isDefault: true
          jsonData:
            timeInterval: 30s

        - name: loki-do-nyc3-prod
          type: loki
          access: proxy
          url: http://loki-gateway.loki.svc.cluster.local
          editable: false
          jsonData:
            timeout: 60
            maxLines: 1000
            httpHeaderName1: X-Scope-OrgID
          secureJsonData:
            httpHeaderValue1: prod

  # Image renderer for PNG export, alerts, and reporting
  imageRenderer:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 1Gi
