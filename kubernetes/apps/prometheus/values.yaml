# Tailscale ingress for Prometheus
prometheusIngress:
  enabled: false
  className: tailscale
  host: ""
  annotations: {}

# Tailscale ingress for Alertmanager
alertmanagerIngress:
  enabled: false
  className: tailscale
  host: ""
  annotations: {}

# ExternalSecret for Thanos S3 credentials from 1Password
externalSecret:
  enabled: false
  itemName: ""

# Base values for kube-prometheus-stack
kube-prometheus-stack:
  # Disable built-in Grafana - we have our own
  grafana:
    enabled: false

  # Alertmanager - single replica, minimal resources
  alertmanager:
    alertmanagerSpec:
      replicas: 1
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi

  # Prometheus server configuration
  prometheus:
    prometheusSpec:
      replicas: 1
      retention: 31d
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          memory: 2Gi
      # Thanos sidecar for long-term metric storage
      thanos:
        objectStorageConfig:
          existingSecret:
            name: thanos-objstore-config
            key: objstore.yml
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            volumeName: pvc-7ddc6d84-068c-4197-ba16-e82aa1c3f73c-1773042939851
            resources:
              requests:
                storage: 50Gi
      # Scrape all ServiceMonitors/PodMonitors regardless of labels
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      # Additional scrape configs for annotation-based discovery
      additionalScrapeConfigs:
        # Scrape pods with prometheus.io/scrape: "true" annotation
        - job_name: kubernetes-pods
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: "true"
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
              action: replace
              target_label: __scheme__
              regex: (https?)
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: (.+?)(?::\d+)?;(\d+)
              replacement: $1:$2
              target_label: __address__
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            # Set job label from prometheus.io/job annotation if present
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_job]
              action: replace
              target_label: job
              regex: (.+)
            # Fall back to app.kubernetes.io/name label if no annotation
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_job, __meta_kubernetes_pod_label_app_kubernetes_io_name]
              action: replace
              target_label: job
              regex: ;(.+)
              replacement: $1
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: pod
    # Expose Thanos sidecar gRPC for Thanos Query to connect
    thanosService:
      enabled: true

  # kube-state-metrics - replaces our standalone app
  kube-state-metrics:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi

  # node-exporter - replaces our standalone app
  prometheus-node-exporter:
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        memory: 64Mi
