apiVersion: v1
kind: Service
metadata:
  name: {{ include "thanos.fullname" . }}-compact
  labels:
    {{- include "thanos.labels" . | nindent 4 }}
    app.kubernetes.io/component: compact
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 10902
      targetPort: http
  selector:
    {{- include "thanos.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: compact
